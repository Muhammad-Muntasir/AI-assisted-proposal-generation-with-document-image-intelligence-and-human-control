name: Deploy AI Proposal Platform

on:
  push:
    branches: [main]

jobs:
  # ── 1. Deploy Backend Lambda ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Lambda
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clean old packages from backend/
        run: |
          find backend/ -mindepth 1 -maxdepth 1 \
            ! -name 'handler.py' \
            ! -name 'requirements.txt' \
            ! -name 'tests' \
            -exec rm -rf {} + 2>/dev/null || true

      - name: Install Linux-compatible packages into backend/
        run: |
          pip install \
            --platform manylinux2014_x86_64 \
            --python-version 3.11 \
            --only-binary=:all: \
            --target backend/ \
            google-genai==1.70.0 \
            boto3==1.42.84 \
            Pillow==12.2.0 \
            pydantic==2.12.5 \
            pydantic-core==2.41.5

      - name: Zip backend
        run: cd backend && zip -r ../backend_deploy.zip . && cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload zip to S3
        run: aws s3 cp backend_deploy.zip s3://aiproposalstack-uploadsbucket5e5e9b64-blphh0ajfcnw/lambda/backend_deploy.zip

      - name: Update unified Lambda
        run: |
          aws lambda update-function-code \
            --function-name ai-proposal-unified \
            --s3-bucket aiproposalstack-uploadsbucket5e5e9b64-blphh0ajfcnw \
            --s3-key lambda/backend_deploy.zip

  # ── 2. Build Frontend ─────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build (vite only, skip tsc)
        run: npx vite build
        working-directory: frontend
        env:
          VITE_API_URL: /api
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://aiproposalstack-uploadsbucket5e5e9b64-blphh0ajfcnw/ --exclude "uploads/*" --exclude "lambda/*" --delete
